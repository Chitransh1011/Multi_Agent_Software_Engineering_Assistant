version: "3.9"

services:

  db:
    image: postgres:16
    container_name: multi_agent_db
    restart: always

    environment:
      POSTGRES_DB: multi_agent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: multi_agent_backend
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

volumes:
  postgres_data: